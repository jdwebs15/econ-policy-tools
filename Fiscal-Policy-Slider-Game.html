<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fiscal Policy Slider Simulation — CS20</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111a2f;
  --text:#e7eefc;
  --muted:#a8b4cf;
  --accent:#7aa2ff;
  --good:#2bd576;
  --bad:#ff5c7a;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui;text-align:center;}
.wrap{width:min(1100px,95vw);margin:20px auto;}
.panel{background:var(--panel);padding:20px;border-radius:18px;}
input{padding:8px;border-radius:8px;border:none;font-size:16px;}
button{padding:10px 16px;border:none;border-radius:10px;margin:5px;cursor:pointer;font-weight:bold;}
button:disabled{opacity:.4;cursor:not-allowed;}
.good{background:var(--good);}
.bad{background:var(--bad);}
.primary{background:var(--accent);color:#000;}
.slider-wrap{display:flex;justify-content:center;gap:80px;margin:26px 0 18px;}
.slider-block{display:flex;flex-direction:column;align-items:center;}
input[type=range]{writing-mode:bt-lr;-webkit-appearance:slider-vertical;width:8px;height:250px;}
.economy{
  margin:14px auto 6px;
  width:150px;height:150px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;transition:.25s;
  font-weight:900; letter-spacing:.06em;
}
.meta{font-size:14px;color:var(--muted);margin-bottom:10px;}
.hidden{display:none;}
.instructions{font-size:14px;color:var(--muted);margin:0 0 14px;line-height:1.35;}
.small{font-size:13px;color:var(--muted);margin-top:10px;}
hr{border:none;border-top:1px solid rgba(255,255,255,.10);margin:14px 0;}
</style>
</head>
<body>
<div class="wrap">

<div id="startScreen" class="panel">
  <h1>Fiscal Policy Simulation</h1>
  <p>Enter Full Name to Begin</p>
  <input id="studentName" placeholder="First and Last Name"/>
  <br><br>
  <button class="primary" onclick="startGame()">Start</button>
  <p class="small">CS20: Government uses taxing/spending to maintain economic stability.</p>
</div>

<div id="gameScreen" class="hidden">
  <div class="meta">
    <span id="timestamp"></span> |
    Time: <span id="timer">0</span>s |
    Accuracy: <span id="accuracy">100</span>%
  </div>

  <div class="panel">
    <h2 id="scenario"></h2>

    <div class="instructions">
      Manipulate at least one tool, then choose Expansionary or Contractionary correctly.
    </div>

    <div class="slider-wrap">
      <div class="slider-block">
        <label><b>Increase Spending ↑</b></label>
        <input type="range" min="-100" max="100" value="0" id="spending">
        <label>Decrease Spending ↓</label>
      </div>

      <div class="slider-block">
        <label><b>Increase Taxes ↑</b></label>
        <input type="range" min="-100" max="100" value="0" id="taxes">
        <label>Decrease Taxes ↓</label>
      </div>
    </div>

    <div class="economy" id="economyBox">ECONOMY</div>

    <hr>

    <button id="expandBtn" class="good" disabled onclick="submitAnswer('Expansionary')">Expansionary</button>
    <button id="contractBtn" class="bad" disabled onclick="submitAnswer('Contractionary')">Contractionary</button>

    <p id="feedback"></p>
  </div>
</div>

<div id="finishScreen" class="panel hidden"></div>

</div>

<script>
const SCENARIOS_MASTER = [
  {q:"A recession hits. Congress launches a highway building program.", a:"Expansionary"},
  {q:"Inflation rises. Congress increases income tax rates.", a:"Contractionary"},
  {q:"Unemployment spikes. Congress extends unemployment benefits.", a:"Expansionary"},
  {q:"Growth overheats. Congress cuts spending.", a:"Contractionary"},
  {q:"GDP declines. Congress increases federal spending.", a:"Expansionary"},
  {q:"Prices rising too quickly. Congress raises payroll taxes.", a:"Contractionary"},
  {q:"Consumer demand weakens. Congress reduces taxes.", a:"Expansionary"},
  {q:"Rapid expansion creates shortages. Congress reduces spending.", a:"Contractionary"},
];

let scenarios=[], index=0, correct=0, attempts=0, timer=0, interval;
let toolUsed=false;

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startGame(){
  if(!studentName.value.trim()) return alert("Enter full name.");
  scenarios=shuffle(SCENARIOS_MASTER);
  startScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");
  timestamp.textContent=new Date().toLocaleString();
  loadScenario();
  interval=setInterval(()=>{timer++;document.getElementById("timer").textContent=timer;},1000);
}

function loadScenario(){
  scenario.textContent=scenarios[index].q;
  feedback.textContent="";
  spending.value=0;
  taxes.value=0;
  toolUsed=false;
  expandBtn.disabled=true;
  contractBtn.disabled=true;
  updateEconomy();
}

document.querySelectorAll("input[type=range]").forEach(s=>{
  s.addEventListener("input", ()=>{
    toolUsed=true;
    expandBtn.disabled=false;
    contractBtn.disabled=false;
    updateEconomy();
  });
});

function updateEconomy(){
  // Spending ↑ expands
  // Taxes ↑ contracts
  let net = parseInt(spending.value) - parseInt(taxes.value);

  let size = 150 + net/2;
  size = Math.max(90, Math.min(240, size));
  economyBox.style.width=size+"px";
  economyBox.style.height=size+"px";
}

function submitAnswer(choice){
  if(!toolUsed) return;
  attempts++;

  if(choice===scenarios[index].a){
    correct++;
    index++;
    if(index>=scenarios.length){
      if(correct===attempts) finishGame();
      else alert("Ticket requires 100% accuracy.");
      return;
    }
    loadScenario();
  } else {
    feedback.textContent="Hint: Expansionary = ↑spending OR ↓taxes. Contractionary = ↓spending OR ↑taxes.";
  }

  accuracy.textContent=Math.round((correct/attempts)*100);
}

function finishGame(){
  clearInterval(interval);
  gameScreen.classList.add("hidden");
  finishScreen.classList.remove("hidden");
  finishScreen.innerHTML=
    "<h2>100% Perfect Run!</h2>"+
    "<p>Time: "+timer+" seconds</p>"+
    "<p>Ticket: FISCAL-"+Math.random().toString(36).substring(2,8).toUpperCase()+"</p>";
}
</script>
</body>
</html>
