<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fiscal Policy Slider Simulation — CS20</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111a2f;
  --text:#e7eefc;
  --muted:#a8b4cf;
  --accent:#7aa2ff;
  --good:#2bd576;
  --bad:#ff5c7a;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui;text-align:center;}
.wrap{width:min(1100px,95vw);margin:20px auto;}
.panel{background:var(--panel);padding:20px;border-radius:18px;}
input{padding:8px;border-radius:8px;border:none;font-size:16px;}
button{padding:10px 16px;border:none;border-radius:10px;margin:5px;cursor:pointer;font-weight:bold;}
button:disabled{opacity:.4;cursor:not-allowed;}
.good{background:var(--good);}
.bad{background:var(--bad);}
.primary{background:var(--accent);color:#000;}
.slider-wrap{display:flex;justify-content:center;gap:80px;margin:30px 0;}
.slider-block{display:flex;flex-direction:column;align-items:center;}
input[type=range]{writing-mode:bt-lr;-webkit-appearance:slider-vertical;width:8px;height:250px;}
.economy{margin:20px auto;width:150px;height:150px;background:var(--accent);display:flex;align-items:center;justify-content:center;border-radius:12px;transition:.3s;font-weight:bold;}
.meta{font-size:14px;color:var(--muted);}
.hidden{display:none;}
.instructions{font-size:14px;color:var(--muted);margin-bottom:15px;}
</style>
</head>
<body>
<div class="wrap">

<div id="startScreen" class="panel">
<h1>Fiscal Policy Simulation</h1>
<p>Enter Full Name to Begin</p>
<input id="studentName" placeholder="First and Last Name"/>
<br><br>
<button class="primary" onclick="startGame()">Start</button>
</div>

<div id="gameScreen" class="hidden">
<div class="meta">
<span id="timestamp"></span> |
Time: <span id="timer">0</span>s |
Accuracy: <span id="accuracy">100</span>%
</div>

<div class="panel">
<h2 id="scenario"></h2>

<div class="instructions">
Step 1: Manipulate at least one fiscal tool (spending or taxes).<br>
Step 2: Choose Expansionary or Contractionary correctly to advance.
</div>

<div class="slider-wrap">
<div class="slider-block">
<label><b>Increase Spending ↑</b></label>
<input type="range" min="-100" max="100" value="0" id="spending">
<label>Decrease Spending ↓</label>
</div>

<div class="slider-block">
<label><b>Decrease Taxes ↑</b></label>
<input type="range" min="-100" max="100" value="0" id="taxes">
<label>Increase Taxes ↓</label>
</div>
</div>

<div class="economy" id="economyBox">ECONOMY</div>

<button id="expandBtn" class="good" disabled onclick="submitAnswer('Expansionary')">Expansionary</button>
<button id="contractBtn" class="bad" disabled onclick="submitAnswer('Contractionary')">Contractionary</button>

<p id="feedback"></p>
</div>
</div>

<div id="finishScreen" class="panel hidden"></div>

</div>

<script>
const scenarios = [
{q:"Unemployment rising sharply. Congress increases unemployment benefits.",a:"Expansionary"},
{q:"Inflation rising rapidly. Congress cuts spending.",a:"Contractionary"},
{q:"Recession begins. Infrastructure spending increases.",a:"Expansionary"},
{q:"Economy overheating. Income taxes raised.",a:"Contractionary"},
{q:"GDP declines. Stimulus checks approved.",a:"Expansionary"},
{q:"Deficit large. Spending reduced.",a:"Contractionary"},
{q:"Consumers slowing. Payroll taxes reduced.",a:"Expansionary"},
{q:"Prices rising fast. Corporate taxes increased.",a:"Contractionary"},
{q:"Unemployment 8%. Education funding rises.",a:"Expansionary"},
{q:"Demand exceeds supply. Taxes increased.",a:"Contractionary"},
{q:"Manufacturing declines. Tax credits expanded.",a:"Expansionary"},
{q:"Inflation high. Subsidies cut.",a:"Contractionary"},
{q:"Recession fears. Defense spending increases.",a:"Expansionary"},
{q:"Stock bubble forming. Capital gains tax raised.",a:"Contractionary"},
{q:"Economic slowdown. Small business deductions expand.",a:"Expansionary"},
{q:"Inflation persistent. Budget cuts enacted.",a:"Contractionary"},
{q:"Housing crash. Federal grants increase.",a:"Expansionary"},
{q:"High inflation continues. Spending decreases.",a:"Contractionary"},
{q:"Consumer confidence falls. Taxes reduced.",a:"Expansionary"},
{q:"Rapid growth. Taxes raised.",a:"Contractionary"},
{q:"Recession spreads. Spending rises.",a:"Expansionary"},
{q:"Inflation accelerates. Spending decreases.",a:"Contractionary"},
{q:"Unemployment surges. Stimulus enacted.",a:"Expansionary"},
{q:"Overheating economy. Taxes increase.",a:"Contractionary"},
{q:"GDP falling. Spending increases.",a:"Expansionary"},
];

let index=0, correct=0, attempts=0, timer=0, interval;
let toolUsed=false;

function startGame(){
if(!studentName.value) return alert("Enter full name.");
startScreen.classList.add("hidden");
gameScreen.classList.remove("hidden");
timestamp.textContent=new Date().toLocaleString();
loadScenario();
interval=setInterval(()=>{timer++;timerDisplay();},1000);
}

function timerDisplay(){timerEl=document.getElementById("timer");timerEl.textContent=timer;}

function loadScenario(){
scenario.textContent=scenarios[index].q;
feedback.textContent="";
spending.value=0; taxes.value=0;
toolUsed=false;
expandBtn.disabled=true;
contractBtn.disabled=true;
updateEconomy();
}

document.querySelectorAll("input[type=range]").forEach(s=>{
s.oninput=()=>{
toolUsed=true;
expandBtn.disabled=false;
contractBtn.disabled=false;
updateEconomy();
};
});

function updateEconomy(){
let net=parseInt(spending.value)-parseInt(taxes.value);
let size=150+net/2;
economyBox.style.width=size+"px";
economyBox.style.height=size+"px";
}

function submitAnswer(choice){
if(!toolUsed) return;
attempts++;
if(choice===scenarios[index].a){
correct++;
index++;
if(index>=scenarios.length){
if(correct===attempts) finishGame();
else alert("You must achieve 100% accuracy for ticket.");
return;
}
loadScenario();
}else{
feedback.textContent="Incorrect. Think: Increase spending OR decrease taxes = expansion.";
}
accuracy.textContent=Math.round((correct/attempts)*100);
}

function finishGame(){
clearInterval(interval);
gameScreen.classList.add("hidden");
finishScreen.classList.remove("hidden");
finishScreen.innerHTML="<h2>100% Perfect Run!</h2>"+
"<p>Time: "+timer+" seconds</p>"+
"<p>Ticket: FISCAL-"+Math.random().toString(36).substring(2,8).toUpperCase()+"</p>";
}
</script>
</body>
</html>
